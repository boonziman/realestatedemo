{{/*
  Minimal Header — used only on the Property Details page.
  Shows a "Return" link, centered logo, and share/save actions.
*/}}
<header class="sticky top-0 z-50 bg-background-light/80 backdrop-blur-xl border-b border-slate-200/50 px-8 py-5 flex items-center justify-between">
  <a href="{{ "/estates/" | relURL }}" class="flex items-center gap-3 text-slate-900 group transition-colors no-underline">
    <span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
    <span class="text-[10px] font-bold tracking-[0.2em] uppercase">Return to Collection</span>
  </a>
  <a href="{{ "/" | relURL }}" class="flex items-center gap-2 font-display no-underline text-slate-900">
    <div class="size-5 text-primary">
      <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
      </svg>
    </div>
    <span class="text-xl font-medium tracking-tight">Elite Homes</span>
  </a>
  <div class="hidden md:flex items-center gap-6">
    <button class="text-[10px] font-bold tracking-[0.2em] uppercase hover:text-primary transition-colors">Share</button>
    <button class="text-[10px] font-bold tracking-[0.2em] uppercase hover:text-primary transition-colors">Save</button>
  </div>
</header>
